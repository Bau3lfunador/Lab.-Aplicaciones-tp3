<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Estilos CSS</title>

    <style>
        body {
            background-color: powderblue;
        }

        h1 {
            color: blue;
            font-family: verdana;
            font-size: 300%;
        }

        p {
            color: red;
            font-family: courier;
            font-size: 160%;
            border: 1px solid powderblue;
            padding: 20px;
            margin: 20px;
        }

        #p01 {
            color: green;
        }

        p.error {
            color: darkred;
        }
    </style>

</head>
<body>

    <h1 style="color:blue;">Estilos HTML con CSS</h1>

    <p>Este es un párrafo normal con estilos internos.</p>

    <p id="p01">Este párrafo usa ID (estilo único).</p>

    <p class="error">Este párrafo usa clase (error).</p>

</body>
</html>
