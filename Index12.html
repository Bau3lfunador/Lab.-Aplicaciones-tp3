<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Formato de texto HTML</title>
</head>
<body>

    <h1>Ejemplo de formato de texto</h1>

    <p><b>This text is bold</b></p>

    <p><i>This text is italic</i></p>

    <p><strong>This text is important (strong)</strong></p>

    <p><em>This text is emphasized</em></p>

    <p><mark>Texto marcado o resaltado</mark></p>

    <p><small>Texto pequeño</small></p>

    <p>Mi color favorito es <del>azul</del> rojo</p>

    <p>Mi color favorito es <ins>verde</ins></p>

    <p>H<sub>2</sub>O (subíndice)</p>

    <p>X<sup>2</sup> (superíndice)</p>

</body>
</html>
