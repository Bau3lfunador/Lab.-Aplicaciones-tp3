<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Colores HTML</title>
</head>
<body>

    <h1 style="background-color:DodgerBlue; color:white;">
        Color de fondo con nombre
    </h1>

    <p style="color:Tomato;">
        Texto con color usando nombre (Tomato)
    </p>

    <h2 style="border:2px solid Violet;">
        Borde de color
    </h2>

    <h3 style="background-color:rgb(255, 99, 71);">
        Color usando RGB
    </h3>

    <h3 style="background-color:#ff6347;">
        Color usando HEX
    </h3>

    <h3 style="background-color:hsl(9, 100%, 64%);">
        Color usando HSL
    </h3>

    <h3 style="background-color:rgba(255, 99, 71, 0.5);">
        Color con transparencia (RGBA)
    </h3>

    <h3 style="background-color:hsla(9, 100%, 64%, 0.5);">
        Color con transparencia (HSLA)
    </h3>

</body>
</html>
